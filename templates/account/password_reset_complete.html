{% extends 'auth_base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 150px);">
    <div class="w-100" style="max-width: 420px;">
        <div class="card shadow-lg border-0 rounded-3">
            <div class="card-header text-center py-4 bg-success text-white">
                <h2 class="mb-0">Password Reset Successful</h2>
            </div>
            <div class="card-body p-5 text-center">
                <div class="mb-4">
                    <div style="font-size: 3rem;">✔️</div>
                </div>

                <p class="lead text-muted mb-4">
                    Your password has been successfully reset!
                </p>

                <div class="alert alert-success">
                    <strong>All set</strong>
                    <p class="mb-0 mt-2">
                        You can now log in with your new password.
                    </p>
                </div>

                <div class="mt-4">
                    <a href="{% url 'account:login' %}" class="btn btn-primary btn-lg">Login with New Password</a>
                </div>

                <hr class="my-4">

                <p class="text-muted small">
                    Back to <a href="{% url 'index' %}" class="fw-bold text-decoration-none">Home</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
