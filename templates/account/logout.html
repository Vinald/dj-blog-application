{% extends 'auth_base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 150px);">
    <div class="w-100" style="max-width: 420px;">
        <div class="card shadow-lg border-0 rounded-3">
            <div class="card-header text-center py-4">
                <h2 class="mb-0">👋 Logout</h2>
            </div>
            <div class="card-body p-5 text-center">
                <p class="text-muted fs-5 mb-4">
                    Are you sure you want to log out? You will need to log in again to access your account.
                </p>

                <form method="POST" class="d-flex gap-3 justify-content-center">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger py-2 px-4 fw-bold">Logout</button>
                    <a href="{% url 'index' %}" class="btn btn-secondary py-2 px-4 fw-bold">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
